<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasty Crousti Runner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0010;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial Black', Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            display: block;
            border: 3px solid #ff3fa0;
            border-radius: 10px;
            box-shadow: 0 0 60px rgba(255,63,160,0.55), 0 0 120px rgba(255,63,160,0.2);
            cursor: pointer;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
canvas.width  = 800;
canvas.height = 600;

const STATE = { MAIN_MENU:'main_menu', RULES:'rules', PLAYING:'playing', GAME_OVER:'game_over' };
let gameState = STATE.MAIN_MENU;

const ROAD_X       = 100;
const ROAD_WIDTH   = 600;
const ROAD_RIGHT   = ROAD_X + ROAD_WIDTH;
const PLAYER_MIN_Y = 390;
const PLAYER_MAX_Y = 555;

const images = {};
const IMAGE_FILES = {
    logo:'images/logo.png', player:'images/player.jpg',
    rice:'images/rice.jpg', sauce:'images/sauce.jpg', onions:'images/onions.png'
};
let imagesReady = 0;
const TOTAL_IMAGES = Object.keys(IMAGE_FILES).length;

function loadImages(cb) {
    Object.entries(IMAGE_FILES).forEach(([k,src]) => {
        const img = new Image();
        img.onload = img.onerror = () => {
            images[k] = img.complete && img.naturalWidth > 0 ? img : null;
            if (++imagesReady === TOTAL_IMAGES) cb();
        };
        img.src = src;
    });
}

let score            = 0;
let highScore        = 0;
let gameSpeed        = 2;
let frameCount       = 0;
let combo            = 0;
let multiplier       = 1;
let speedStage       = 0;

let damageShakeTime  = 0;
let damageShakeAmp   = 0;
function triggerDamageShake(amp, dur) { damageShakeAmp = amp; damageShakeTime = dur; }

let speedFlashProgress = 0;
let speedFlashActive   = false;
const SPEED_FLASH_DUR  = 90;
function triggerSpeedFlash() { speedFlashProgress = 0; speedFlashActive = true; }
function getSpeedFlashAlpha() {
    if (!speedFlashActive) return 0;
    return Math.sin((speedFlashProgress / SPEED_FLASH_DUR) * Math.PI) * 0.28;
}

let activePowerup  = null;
let powerupTimer   = 0;

const SHIELD_DURATION = 360;
const SLOW_DURATION   = 300;
const SLOW_FACTOR     = 0.32;

let popups = [];

function spawnPopup(x, y, text, color) {
    popups.push({ x, y, text, color, life: 1.0, vy: -1.8 });
}

function updatePopups() {
    popups.forEach(p => { p.y += p.vy; p.life -= 0.022; });
    popups = popups.filter(p => p.life > 0);
}

function drawPopups() {
    popups.forEach(p => {
        ctx.save();
        ctx.globalAlpha  = p.life;
        ctx.fillStyle    = p.color;
        ctx.font         = 'bold 22px Arial Black, Arial';
        ctx.textAlign    = 'center';
        ctx.shadowColor  = 'rgba(0,0,0,0.8)';
        ctx.shadowBlur   = 6;
        ctx.fillText(p.text, p.x, p.y);
        ctx.restore();
    });
}

let particles = [];

function spawnParticles(x, y, color) {
    for (let i = 0; i < 14; i++) {
        const a = Math.random() * Math.PI * 2, s = 2 + Math.random() * 5;
        particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
            life: 1.0, decay: 0.025 + Math.random()*0.03, size: 4 + Math.random()*7, color });
    }
}

function updateParticles() {
    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life -= p.decay; });
    particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
    particles.forEach(p => {
        ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); ctx.fill(); ctx.restore();
    });
}

const player = {
    x: canvas.width/2, y: 500, width: 74, height: 82, speed: 6,
    lives: 3, maxLives: 3,
    invincible: false, invTimer: 0, INV_DURATION: 120, visible: true,

    update() {
        if (keys['ArrowLeft']  || keys['KeyA']) this.x -= this.speed;
        if (keys['ArrowRight'] || keys['KeyD']) this.x += this.speed;
        if (keys['ArrowUp']    || keys['KeyW']) this.y -= this.speed;
        if (keys['ArrowDown']  || keys['KeyS']) this.y += this.speed;
        this.x = Math.max(ROAD_X + this.width/2,        Math.min(ROAD_RIGHT - this.width/2, this.x));
        this.y = Math.max(PLAYER_MIN_Y + this.height/2, Math.min(PLAYER_MAX_Y, this.y));

        if (this.invincible) {
            this.invTimer--;
            this.visible = Math.floor(this.invTimer / 8) % 2 === 0;
            if (this.invTimer <= 0) { this.invincible = false; this.visible = true; }
        }
    },

    hit() {
        if (activePowerup === 'shield') return false;
        if (this.invincible) return false;
        this.lives--;
        this.invincible = true; this.invTimer = this.INV_DURATION;
        triggerDamageShake(12, 22);
        spawnParticles(this.x, this.y, '#ff3fa0');
        combo = 0; multiplier = 1;
        return true;
    },

    draw() {
        if (!this.visible) return;
        const dx = this.x - this.width/2, dy = this.y - this.height/2;
        ctx.save();
        if (images.player) {
            ctx.beginPath(); ctx.roundRect(dx, dy, this.width, this.height, 14); ctx.clip();
            ctx.drawImage(images.player, dx, dy, this.width, this.height);
        } else {
            ctx.fillStyle = '#ff3fa0'; ctx.beginPath();
            ctx.roundRect(dx, dy, this.width, this.height, 14); ctx.fill();
            ctx.fillStyle = 'white'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
            ctx.fillText('BARQUETTE', this.x, this.y);
        }
        ctx.shadowColor = 'rgba(255,63,160,0.9)'; ctx.shadowBlur = 24;
        ctx.strokeStyle = 'rgba(255,63,160,0.75)'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.roundRect(dx-3, dy-3, this.width+6, this.height+6, 16); ctx.stroke();
        ctx.restore();

        if (activePowerup === 'shield') {
            const pulse = 0.85 + 0.15 * Math.sin(frameCount * 0.15);
            ctx.save();
            ctx.globalAlpha = 0.55;
            ctx.strokeStyle = '#00eeff'; ctx.lineWidth = 3;
            ctx.shadowColor = 'rgba(0,230,255,0.9)'; ctx.shadowBlur = 20;
            ctx.beginPath(); ctx.arc(this.x, this.y, 52 * pulse, 0, Math.PI*2); ctx.stroke();
            ctx.globalAlpha = 0.1;
            ctx.fillStyle   = '#00eeff';
            ctx.beginPath(); ctx.arc(this.x, this.y, 52 * pulse, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }
    },

    getHitbox() {
        return { x: this.x - this.width/2 + 14, y: this.y - this.height/2 + 14,
                 width: this.width - 28,           height: this.height - 28 };
    }
};

const OBS_DEFS = [
    { id:'rice',         name:'RICE',   imageKey:'rice',   color:'#f0e68c', w:62,h:62, speedMult:1.0, behavior:'straight' },
    { id:'sauce',        name:'SAUCE',  imageKey:'sauce',  color:'#e0e0e0', w:58,h:58, speedMult:0.85,behavior:'straight' },
    { id:'onions',       name:'ONIONS', imageKey:'onions', color:'#c68642', w:52,h:52, speedMult:1.6, behavior:'straight' },
    { id:'rice_zigzag',  name:'RICE',   imageKey:'rice',   color:'#f0e68c', w:60,h:60, speedMult:0.9, behavior:'zigzag'   },
    { id:'sauce_zigzag', name:'SAUCE',  imageKey:'sauce',  color:'#e0e0e0', w:56,h:56, speedMult:1.1, behavior:'zigzag'   }
];

let obstacles        = [];
let obstacleTimer    = 0;
let obstacleInterval = 130;

function spawnObstacle() {
    const def = OBS_DEFS[Math.floor(Math.random() * OBS_DEFS.length)];
    const x   = ROAD_X + def.w/2 + Math.random() * (ROAD_WIDTH - def.w);
    obstacles.push({ x, y: -def.h/2-10, width:def.w, height:def.h,
        speed: gameSpeed * def.speedMult, color:def.color, name:def.name,
        imageKey:def.imageKey, behavior:def.behavior, originX:x,
        phase: Math.random() * Math.PI * 2 });
}

function updateObstacles() {
    obstacleTimer++;
    if (obstacleTimer >= obstacleInterval) {
        spawnObstacle(); obstacleTimer = 0;
        obstacleInterval = Math.max(55, 130 - Math.floor(score / 1200) * 8);
    }
    const time = frameCount * 0.038;
    const speedMod = activePowerup === 'slow' ? SLOW_FACTOR : 1;
    obstacles.forEach(obs => {
        obs.y += obs.speed * speedMod;
        if (obs.behavior === 'zigzag') {
            obs.x = obs.originX + Math.sin(time + obs.phase) * 90;
            obs.x = Math.max(ROAD_X + obs.width/2, Math.min(ROAD_RIGHT - obs.width/2, obs.x));
        }
    });
    obstacles = obstacles.filter(obs => obs.y < canvas.height + 80);
}

function drawObstacles() {
    obstacles.forEach(obs => {
        const dx = obs.x - obs.width/2, dy = obs.y - obs.height/2;
        const img = images[obs.imageKey];
        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 16; ctx.shadowOffsetY = 8;
        ctx.beginPath(); ctx.arc(obs.x, obs.y, obs.width/2, 0, Math.PI*2);
        if (img) { ctx.clip(); ctx.drawImage(img, dx, dy, obs.width, obs.height); }
        else {
            ctx.fillStyle = obs.color; ctx.fill();
            ctx.fillStyle = '#333'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
            ctx.fillText(obs.name, obs.x, obs.y + 4);
        }
        if (activePowerup === 'slow') {
            ctx.restore(); ctx.save();
            ctx.globalAlpha = 0.4; ctx.strokeStyle = '#00aaff'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(obs.x, obs.y, obs.width/2 + 4, 0, Math.PI*2); ctx.stroke();
        }
        ctx.restore();
    });
}

const REWARD_TYPES = [
    { id:'star',   label:'+200 pts',   color:'#ffdd00', glowColor:'rgba(255,220,0,0.9)',   description:'Points bonus',              w:44, h:44, weight:4 },
    { id:'shield', label:'🛡️ SHIELD', color:'#00eeff', glowColor:'rgba(0,230,255,0.9)',   description:'Invincibilité 6 secondes',  w:44, h:44, weight:2 },
    { id:'life',   label:'❤️ +VIE',   color:'#ff4488', glowColor:'rgba(255,68,136,0.9)',  description:'Récupère une vie',          w:44, h:44, weight:2 },
    { id:'slow',   label:'🐌 SLOW',   color:'#aa88ff', glowColor:'rgba(170,136,255,0.9)', description:'Ralentit les obstacles 5s', w:44, h:44, weight:3 }
];

const REWARD_POOL = [];
REWARD_TYPES.forEach(t => { for (let i = 0; i < t.weight; i++) REWARD_POOL.push(t); });

let rewards       = [];
let rewardTimer   = 0;
let rewardInterval = 280;

function spawnReward() {
    const type = REWARD_POOL[Math.floor(Math.random() * REWARD_POOL.length)];
    if (type.id === 'life' && player.lives >= player.maxLives) return;
    const x = ROAD_X + type.w/2 + 30 + Math.random() * (ROAD_WIDTH - type.w - 60);
    rewards.push({ x, y: -type.h/2 - 10, ...type, phase: Math.random() * Math.PI * 2 });
}

function updateRewards() {
    rewardTimer++;
    if (rewardTimer >= rewardInterval) {
        spawnReward(); rewardTimer = 0;
        rewardInterval = Math.max(200, 280 - Math.floor(score / 1000) * 10);
    }
    rewards.forEach(r => { r.y += gameSpeed * 0.7; });
    rewards = rewards.filter(r => r.y < canvas.height + 80);
}

function drawReward(r) {
    const pulse = 0.82 + 0.18 * Math.sin(frameCount * 0.12 + r.phase);
    const radius = (r.w / 2) * pulse;
    ctx.save();
    ctx.shadowColor = r.glowColor; ctx.shadowBlur = 28 * pulse;
    ctx.strokeStyle = r.color; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(r.x, r.y, radius + 6, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha  = 0.92;
    const bg = ctx.createRadialGradient(r.x - radius*0.2, r.y - radius*0.2, 0, r.x, r.y, radius);
    bg.addColorStop(0, '#ffffff22');
    bg.addColorStop(1, r.color + '55');
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.arc(r.x, r.y, radius, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    ctx.font = `bold ${radius * 0.9}px Arial`; ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const icons = { star:'⭐', shield:'🛡️', life:'❤️', slow:'🐌' };
    ctx.fillText(icons[r.id], r.x, r.y);
    ctx.textBaseline = 'alphabetic';
    ctx.restore();
}

function drawRewards() { rewards.forEach(r => drawReward(r)); }

function checkRewardCollection() {
    const p = player.getHitbox();
    for (const r of rewards) {
        const dist = Math.hypot(r.x - (p.x + p.width/2), r.y - (p.y + p.height/2));
        if (dist < r.w / 2 + 10) {
            applyReward(r);
            rewards = rewards.filter(rw => rw !== r);
            break;
        }
    }
}

function applyReward(r) {
    spawnParticles(r.x, r.y, r.color);
    switch (r.id) {
        case 'star':
            score += 200 * multiplier;
            spawnPopup(r.x, r.y - 20, `+${200 * multiplier} pts`, '#ffdd00');
            break;
        case 'shield':
            activePowerup = 'shield';
            powerupTimer  = SHIELD_DURATION;
            spawnPopup(r.x, r.y - 20, '🛡️ SHIELD !', '#00eeff');
            break;
        case 'life':
            if (player.lives < player.maxLives) {
                player.lives++;
                spawnPopup(r.x, r.y - 20, '❤️ +1 VIE !', '#ff4488');
            }
            break;
        case 'slow':
            activePowerup = 'slow';
            powerupTimer  = SLOW_DURATION;
            spawnPopup(r.x, r.y - 20, '🐌 SLOW !', '#aa88ff');
            break;
    }
}

function checkCollisions() {
    if (player.invincible || activePowerup === 'shield') return false;
    const p = player.getHitbox();
    for (const obs of obstacles) {
        const r     = obs.width/2 - 6;
        const nearX = Math.max(p.x, Math.min(obs.x, p.x + p.width));
        const nearY = Math.max(p.y, Math.min(obs.y, p.y + p.height));
        if (Math.hypot(obs.x - nearX, obs.y - nearY) < r) {
            spawnParticles(obs.x, obs.y, obs.color);
            obstacles = obstacles.filter(o => o !== obs);
            return true;
        }
    }
    return false;
}

let roadScroll = 0, decoScroll = 0, neonPulse = 0;

function drawBackground() {
    neonPulse += 0.04;
    const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bg.addColorStop(0, '#0a0018'); bg.addColorStop(1, '#150028');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#120020';
    ctx.fillRect(0, 0, ROAD_X, canvas.height);
    ctx.fillRect(ROAD_RIGHT, 0, canvas.width - ROAD_RIGHT, canvas.height);
    ctx.strokeStyle = 'rgba(255,63,160,0.12)'; ctx.lineWidth = 1;
    for (let y = 0; y < canvas.height; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(ROAD_X, y); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(ROAD_RIGHT, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }
    decoScroll = (decoScroll + gameSpeed * 1.0) % 160;
    const neonGlow = 0.5 + 0.3 * Math.sin(neonPulse);
    const panelW = 84, panelH = 54, panelRadius = 8;
    for (let i = -1; i < Math.ceil(canvas.height/160)+1; i++) {
        const y = (i*160 + decoScroll) % (canvas.height+160) - 80;
        for (const sx of [8, ROAD_RIGHT + 8]) {
            ctx.save();
            ctx.shadowColor = `rgba(255,63,160,${neonGlow})`; ctx.shadowBlur = 18;
            ctx.strokeStyle = `rgba(255,63,160,${0.5 + neonGlow*0.5})`; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(sx, y, panelW, panelH, panelRadius); ctx.stroke();
            ctx.shadowBlur  = 0;
            ctx.fillStyle   = 'rgba(10,0,20,0.75)';
            ctx.beginPath(); ctx.roundRect(sx, y, panelW, panelH, panelRadius); ctx.fill();
            if (images.logo) {
                ctx.beginPath(); ctx.roundRect(sx+3, y+3, panelW-6, panelH-6, panelRadius-2); ctx.clip();
                ctx.globalAlpha = 0.85;
                ctx.drawImage(images.logo, sx+3, y+3, panelW-6, panelH-6);
            } else {
                ctx.fillStyle  = '#ff3fa0';
                ctx.font       = 'bold 10px Arial';
                ctx.textAlign  = 'center';
                ctx.fillText('TASTY', sx + panelW/2, y + panelH/2 - 4);
                ctx.fillText('CROUSTI', sx + panelW/2, y + panelH/2 + 9);
            }
            ctx.restore();
        }
    }
    const roadGrad = ctx.createLinearGradient(ROAD_X, 0, ROAD_RIGHT, 0);
    roadGrad.addColorStop(0,'#191925'); roadGrad.addColorStop(0.5,'#1e1e2e'); roadGrad.addColorStop(1,'#191925');
    ctx.fillStyle = roadGrad; ctx.fillRect(ROAD_X, 0, ROAD_WIDTH, canvas.height);
    if (activePowerup === 'slow') {
        const t = powerupTimer / SLOW_DURATION;
        ctx.fillStyle = `rgba(120,80,255,${0.12 * t})`;
        ctx.fillRect(ROAD_X, 0, ROAD_WIDTH, canvas.height);
    }
    ctx.save();
    ctx.shadowColor = `rgba(255,63,160,${0.7 + 0.3*Math.sin(neonPulse)})`; ctx.shadowBlur = 20;
    ctx.strokeStyle = '#ff3fa0'; ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(ROAD_X,0); ctx.lineTo(ROAD_X, canvas.height);
    ctx.moveTo(ROAD_RIGHT,0); ctx.lineTo(ROAD_RIGHT, canvas.height);
    ctx.stroke(); ctx.restore();
    roadScroll = (roadScroll + gameSpeed * 0.85) % 80;
    ctx.save(); ctx.strokeStyle = 'rgba(255,180,255,0.2)'; ctx.lineWidth = 2;
    ctx.setLineDash([38,42]); ctx.lineDashOffset = roadScroll;
    const laneW = ROAD_WIDTH/3;
    for (let i=1;i<=2;i++) {
        const lx = ROAD_X + laneW*i;
        ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx, canvas.height); ctx.stroke();
    }
    ctx.setLineDash([]); ctx.restore();
    ctx.save(); ctx.strokeStyle = 'rgba(255,63,160,0.25)'; ctx.lineWidth = 2;
    ctx.setLineDash([10,10]);
    ctx.beginPath(); ctx.moveTo(ROAD_X, PLAYER_MIN_Y); ctx.lineTo(ROAD_RIGHT, PLAYER_MIN_Y); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
    if (images.logo) {
        ctx.save(); ctx.globalAlpha = 0.28;
        ctx.drawImage(images.logo, 6, canvas.height - 52, 130, 46);
        ctx.restore();
    }
}

function drawHUD() {
    ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.beginPath(); ctx.roundRect(8,8,215,44,22); ctx.fill();
    ctx.fillStyle = '#ffdd00'; ctx.font = 'bold 23px Arial'; ctx.textAlign = 'left';
    ctx.fillText(`Score: ${Math.floor(score)}`, 22, 38);
    if (multiplier > 1) {
        ctx.fillStyle = '#cc00aa'; ctx.beginPath(); ctx.roundRect(230,8,80,44,22); ctx.fill();
        ctx.fillStyle = 'white'; ctx.font = 'bold 22px Arial'; ctx.fillText(`×${multiplier}`, 246, 38);
    }
    for (let i = 0; i < player.maxLives; i++)
        ctx.fillText(i < player.lives ? '❤️' : '🖤', canvas.width-48-i*42, 42);
    if (highScore > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.roundRect(8,58,215,28,14); ctx.fill();
        ctx.fillStyle = '#ff99ee'; ctx.font = '14px Arial'; ctx.textAlign = 'left';
        ctx.fillText(`Best: ${Math.floor(highScore)}`, 22, 77);
    }
    if (activePowerup) {
        const barW = 200, barH = 14;
        const barX = canvas.width/2 - barW/2;
        const barY = canvas.height - 28;
        const dur  = activePowerup === 'shield' ? SHIELD_DURATION : SLOW_DURATION;
        const fill = (powerupTimer / dur) * barW;
        const col  = activePowerup === 'shield' ? '#00eeff' : '#aa88ff';
        const icon = activePowerup === 'shield' ? '🛡️' : '🐌';
        ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.beginPath();
        ctx.roundRect(barX - 30, barY - 4, barW + 60, barH + 8, 10); ctx.fill();
        ctx.fillStyle = col + '55'; ctx.beginPath();
        ctx.roundRect(barX, barY, barW, barH, 7); ctx.fill();
        ctx.fillStyle = col; ctx.beginPath();
        ctx.roundRect(barX, barY, fill, barH, 7); ctx.fill();
        ctx.font = '13px Arial'; ctx.textAlign = 'right';
        ctx.fillText(icon, barX - 4, barY + barH - 1);
        ctx.fillStyle = 'white'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
        const label = activePowerup === 'shield' ? 'SHIELD' : 'SLOW';
        ctx.fillText(label, canvas.width/2, barY + barH - 1);
    }
    if (multiplier > 1) {
        ctx.save(); ctx.globalAlpha = 0.9; ctx.fillStyle = '#ff88ff';
        ctx.font = `bold ${14 + multiplier*3}px Arial`; ctx.textAlign = 'center';
        ctx.fillText(`COMBO ×${multiplier}!`, player.x, player.y - player.height/2 - 12);
        ctx.restore();
    }
    const sfa = getSpeedFlashAlpha();
    if (sfa > 0) {
        const fg = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width*0.75);
        fg.addColorStop(0, `rgba(0,230,255,${sfa*0.4})`);
        fg.addColorStop(0.5, `rgba(0,180,255,${sfa*0.6})`);
        fg.addColorStop(1, `rgba(80,0,255,${sfa})`);
        ctx.fillStyle = fg; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.save(); ctx.globalAlpha = sfa/0.28;
        ctx.fillStyle = '#00eeff'; ctx.font = 'bold 28px Arial Black, Arial';
        ctx.textAlign = 'center'; ctx.shadowColor = 'rgba(0,230,255,0.9)'; ctx.shadowBlur = 20;
        ctx.fillText('⚡ SPEED UP! ⚡', canvas.width/2, 115);
        ctx.restore();
    }
    if (damageShakeTime > 0) {
        ctx.fillStyle = `rgba(220,0,0,${(damageShakeTime/22)*0.4})`;
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }
}

let menuButtons = [];

function drawButton(label, x, y, w, h, hovered) {
    ctx.save();
    if (hovered) { ctx.shadowColor = 'rgba(255,63,160,0.9)'; ctx.shadowBlur = 30; }
    const bg = ctx.createLinearGradient(x,y,x,y+h);
    bg.addColorStop(0, hovered ? '#ff3fa0' : '#6a006a');
    bg.addColorStop(1, hovered ? '#cc007a' : '#3a0040');
    ctx.fillStyle = bg; ctx.beginPath(); ctx.roundRect(x,y,w,h,h/2); ctx.fill();
    ctx.strokeStyle = hovered ? '#ffffff' : '#ff3fa0'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(x,y,w,h,h/2); ctx.stroke();
    ctx.fillStyle = 'white'; ctx.font = `bold ${h*0.42}px Arial Black, Arial`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'transparent';
    ctx.fillText(label, x+w/2, y+h/2); ctx.textBaseline = 'alphabetic';
    ctx.restore();
}

let mouseX = -999, mouseY = -999;
canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouseX = (e.clientX - r.left) * (canvas.width  / r.width);
    mouseY = (e.clientY - r.top)  * (canvas.height / r.height);
});
canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    const cx = (e.clientX - r.left) * (canvas.width  / r.width);
    const cy = (e.clientY - r.top)  * (canvas.height / r.height);
    for (const btn of menuButtons)
        if (cx >= btn.x && cx <= btn.x+btn.w && cy >= btn.y && cy <= btn.y+btn.h) btn.action();
});
function isHovered(x,y,w,h) { return mouseX>=x && mouseX<=x+w && mouseY>=y && mouseY<=y+h; }

function drawMainMenu() {
    const bg = ctx.createLinearGradient(0,0,0,canvas.height);
    bg.addColorStop(0,'rgba(60,0,80,0.92)'); bg.addColorStop(0.6,'rgba(10,0,30,0.96)'); bg.addColorStop(1,'rgba(0,0,10,0.98)');
    ctx.fillStyle = bg; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.textAlign = 'center';
    if (images.logo) {
        ctx.save(); ctx.shadowColor='rgba(255,63,160,0.7)'; ctx.shadowBlur=40;
        ctx.drawImage(images.logo, canvas.width/2-220, 38, 440, 140); ctx.restore();
    } else {
        ctx.save(); ctx.shadowColor='rgba(255,63,160,0.8)'; ctx.shadowBlur=30;
        ctx.fillStyle='#ff3fa0'; ctx.font='bold 52px Arial Black, Arial';
        ctx.fillText('TASTY CROUSTI', canvas.width/2, 140); ctx.restore();
    }
    ctx.fillStyle='#ffdd00'; ctx.font='bold 32px Arial Black, Arial'; ctx.fillText('RUNNER', canvas.width/2, 210);
    ctx.fillStyle='#dd88cc'; ctx.font='italic 18px Arial'; ctx.fillText('"Nothing is Safe"', canvas.width/2, 242);
    const lg = ctx.createLinearGradient(canvas.width/2-180,0,canvas.width/2+180,0);
    lg.addColorStop(0,'transparent'); lg.addColorStop(0.5,'#ff3fa0'); lg.addColorStop(1,'transparent');
    ctx.strokeStyle=lg; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(canvas.width/2-180,262); ctx.lineTo(canvas.width/2+180,262); ctx.stroke();
    menuButtons = [];
    const btnW=220, btnH=60;
    const cx = canvas.width/2 - btnW/2;
    drawButton('▶  JOUER',    cx, 305, btnW, btnH, isHovered(cx,305,btnW,btnH));
    menuButtons.push({ x:cx, y:305, w:btnW, h:btnH, action:() => { resetGame(); gameState=STATE.PLAYING; } });
    drawButton('📋  RÈGLES',  cx, 385, btnW, btnH, isHovered(cx,385,btnW,btnH));
    menuButtons.push({ x:cx, y:385, w:btnW, h:btnH, action:() => { gameState=STATE.RULES; } });
    ctx.fillStyle='rgba(200,150,200,0.7)'; ctx.font='14px Arial';
    ctx.fillText('ou appuyez sur  ESPACE  pour jouer', canvas.width/2, 475);
}

function drawRulesScreen() {
    const bg = ctx.createLinearGradient(0,0,0,canvas.height);
    bg.addColorStop(0,'rgba(60,0,80,0.95)'); bg.addColorStop(1,'rgba(5,0,15,0.98)');
    ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.textAlign='center';
    ctx.save(); ctx.shadowColor='rgba(255,63,160,0.8)'; ctx.shadowBlur=20;
    ctx.fillStyle='#ff3fa0'; ctx.font='bold 36px Arial Black, Arial';
    ctx.fillText('📋  RÈGLES DU JEU', canvas.width/2, 58); ctx.restore();
    const lg = ctx.createLinearGradient(200,0,600,0);
    lg.addColorStop(0,'transparent'); lg.addColorStop(0.5,'#ff3fa0'); lg.addColorStop(1,'transparent');
    ctx.strokeStyle=lg; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(200,74); ctx.lineTo(600,74); ctx.stroke();
    const rules = [
        { icon:'🎯', title:'Objectif',      text:'Survivre le plus longtemps possible en esquivant les ingrédients !' },
        { icon:'🕹️', title:'Contrôles',     text:'WASD ou ← ↑ ↓ → pour déplacer votre barquette (haut/bas/gauche/droite).' },
        { icon:'💥', title:'Obstacles',      text:'Riz, Sauce, Oignons frits tombent — ne les touchez pas !' },
        { icon:'❤️', title:'3 Vies',         text:'Chaque collision coûte une vie. Après un coup : 2 sec d\'invincibilité.' },
        { icon:'⭐', title:'Récompenses',    text:'Collectez les items brillants : ⭐ pts ·  🛡️ bouclier ·  ❤️ vie ·  🐌 slow !' },
        { icon:'🔥', title:'Combo × Bonus',  text:'Survivez sans être touché pour activer le multiplicateur ×2 à ×5 !' },
    ];
    rules.forEach((r, i) => {
        const y = 105 + i * 72;
        ctx.fillStyle='rgba(255,63,160,0.08)'; ctx.beginPath(); ctx.roundRect(80,y-10,640,56,10); ctx.fill();
        ctx.strokeStyle='rgba(255,63,160,0.2)'; ctx.lineWidth=1; ctx.beginPath(); ctx.roundRect(80,y-10,640,56,10); ctx.stroke();
        ctx.font='22px Arial'; ctx.textAlign='left'; ctx.fillText(r.icon, 102, y+24);
        ctx.fillStyle='#ff88cc'; ctx.font='bold 15px Arial'; ctx.fillText(r.title+' :', 140, y+14);
        ctx.fillStyle='rgba(255,230,255,0.85)'; ctx.font='14px Arial'; ctx.fillText(r.text, 140, y+36);
    });
    menuButtons = [];
    const btnW=200, btnH=52, btnX=canvas.width/2-100, btnY=canvas.height-72;
    drawButton('← RETOUR', btnX, btnY, btnW, btnH, isHovered(btnX,btnY,btnW,btnH));
    menuButtons.push({ x:btnX, y:btnY, w:btnW, h:btnH, action:() => { gameState=STATE.MAIN_MENU; } });
}

function drawGameOver() {
    ctx.fillStyle='rgba(0,0,0,0.84)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.textAlign='center';
    ctx.save(); ctx.shadowColor='rgba(255,50,50,0.8)'; ctx.shadowBlur=30;
    ctx.fillStyle='#ff2244'; ctx.font='bold 66px Arial Black, Arial';
    ctx.fillText('GAME OVER', canvas.width/2, 185); ctx.restore();
    ctx.fillStyle='#dd88aa'; ctx.font='italic 20px Arial';
    ctx.fillText('Les ingrédients ont eu ta peau...', canvas.width/2, 228);
    ctx.fillStyle='rgba(255,63,160,0.18)'; ctx.beginPath();
    ctx.roundRect(canvas.width/2-175, 252, 350, 115, 18); ctx.fill();
    ctx.fillStyle='white'; ctx.font='bold 32px Arial';
    ctx.fillText(`Score: ${Math.floor(score)}`, canvas.width/2, 298);
    ctx.fillStyle='#ffdd00'; ctx.font='20px Arial';
    ctx.fillText(`Meilleur Score: ${Math.floor(highScore)}`, canvas.width/2, 340);
    menuButtons = [];
    const btnW=210, btnH=54, btnY=400;
    const rx=canvas.width/2-btnW-15, mx=canvas.width/2+15;
    drawButton('▶ REJOUER', rx, btnY, btnW, btnH, isHovered(rx,btnY,btnW,btnH));
    menuButtons.push({ x:rx, y:btnY, w:btnW, h:btnH, action:() => { resetGame(); gameState=STATE.PLAYING; } });
    drawButton('🏠 MENU',   mx, btnY, btnW, btnH, isHovered(mx,btnY,btnW,btnH));
    menuButtons.push({ x:mx, y:btnY, w:btnW, h:btnH, action:() => { gameState=STATE.MAIN_MENU; } });
    ctx.fillStyle='rgba(200,150,200,0.65)'; ctx.font='14px Arial';
    ctx.fillText('ou appuyez sur  ESPACE  pour rejouer', canvas.width/2, 480);
}

function resetGame() {
    score=0; gameSpeed=2; frameCount=0; combo=0; multiplier=1; speedStage=0;
    obstacleTimer=0; obstacleInterval=130;
    rewardTimer=0; rewardInterval=280;
    obstacles=[]; rewards=[]; particles=[]; popups=[];
    roadScroll=0; decoScroll=0;
    damageShakeTime=0; speedFlashActive=false; speedFlashProgress=0;
    activePowerup=null; powerupTimer=0;
    menuButtons=[];
    player.x=canvas.width/2; player.y=500; player.lives=3;
    player.invincible=false; player.invTimer=0; player.visible=true;
}

function update() {
    frameCount++;
    if (gameState !== STATE.PLAYING) return;
    score += 0.1 * gameSpeed * multiplier;
    combo++;
    multiplier = Math.min(5, 1 + Math.floor(combo / 150));
    const newStage = Math.floor(score / 1500);
    if (newStage > speedStage) {
        speedStage = newStage;
        gameSpeed  = Math.min(2 + speedStage * 0.55, 10);
        triggerSpeedFlash();
    }
    if (damageShakeTime > 0) damageShakeTime--;
    if (speedFlashActive) { speedFlashProgress++; if (speedFlashProgress >= SPEED_FLASH_DUR) speedFlashActive = false; }
    if (activePowerup) {
        powerupTimer--;
        if (powerupTimer <= 0) { activePowerup = null; powerupTimer = 0; }
    }
    player.update();
    updateObstacles();
    updateRewards();
    updateParticles();
    updatePopups();
    checkRewardCollection();
    if (checkCollisions()) {
        player.hit();
        if (player.lives <= 0) {
            if (score > highScore) highScore = score;
            gameState = STATE.GAME_OVER;
        }
    }
}

function draw() {
    ctx.save();
    if (damageShakeTime > 0) {
        const i = damageShakeAmp * (damageShakeTime/22);
        ctx.translate((Math.random()-0.5)*i, (Math.random()-0.5)*i);
    }
    ctx.clearRect(-50,-50,canvas.width+100,canvas.height+100);
    drawBackground();
    if (gameState === STATE.PLAYING || gameState === STATE.GAME_OVER) {
        drawObstacles(); drawRewards(); drawParticles(); drawPopups();
        player.draw(); drawHUD();
    }
    ctx.restore();
    if (gameState === STATE.MAIN_MENU) drawMainMenu();
    if (gameState === STATE.RULES)     drawRulesScreen();
    if (gameState === STATE.GAME_OVER) drawGameOver();
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

const keys = {};
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (gameState === STATE.MAIN_MENU  && e.code === 'Space') { resetGame(); gameState = STATE.PLAYING; }
    if (gameState === STATE.GAME_OVER  && e.code === 'Space') { resetGame(); gameState = STATE.PLAYING; }
    if (gameState === STATE.RULES      && e.code === 'Escape') { gameState = STATE.MAIN_MENU; }
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

loadImages(() => { gameLoop(); });
</script>
